services:
  neo4j:
    image: neo4j:5.26-community
    container_name: athena-se-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/athena-password
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p athena-password 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: athena-se-backend
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-300000}
      OLLAMA_MAX_CONTEXT_NODES: ${OLLAMA_MAX_CONTEXT_NODES:-20}
      OLLAMA_MAX_CONTEXT_EDGES: ${OLLAMA_MAX_CONTEXT_EDGES:-30}
      OLLAMA_MAX_DESCRIPTION_CHARS: ${OLLAMA_MAX_DESCRIPTION_CHARS:-180}
      OLLAMA_WARMUP_ON_START: ${OLLAMA_WARMUP_ON_START:-false}
      OPENAI_EXTRACTION_MODEL: ${OPENAI_EXTRACTION_MODEL:-gpt-4.1-mini}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    container_name: athena-se-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
